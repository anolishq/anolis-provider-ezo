name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "working/**"
      - "**/*.md"
      - "**/*.png"
      - "**/*.svg"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "working/**"
      - "**/*.md"
      - "**/*.png"
      - "**/*.svg"
  workflow_dispatch:

concurrency:
  group: provider-ezo-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  VCPKG_COMMIT: "66c0373dc7fca549e5803087b9487edfe3aca0a1"

permissions:
  contents: read

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ matrix.timeout_minutes }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux Build and Test (no hardware)
            os: ubuntu-24.04
            configure_preset: dev-release
            build_preset: dev-release
            test_preset: dev-release
            timeout_minutes: 30
          - name: Windows Build and Test (no hardware)
            os: windows-2022
            configure_preset: dev-windows-release
            build_preset: dev-windows-release
            test_preset: dev-windows-release
            timeout_minutes: 45

    steps:
      - name: Checkout anolis-provider-ezo
        uses: actions/checkout@v4
        with:
          path: anolis-provider-ezo

      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++

      - name: Install ezo-driver from release (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -fsSL https://github.com/feastorg/ezo-driver/archive/refs/tags/v0.5.1.tar.gz -o ezo-driver.tar.gz
          tar -xzf ezo-driver.tar.gz
          cmake -S ezo-driver-0.5.1 -B ezo-driver-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DEZO_BUILD_TESTS=OFF \
            -DEZO_BUILD_EXAMPLES=OFF \
            -DEZO_BUILD_ARDUINO_ADAPTER=OFF \
            -DEZO_BUILD_LINUX_ADAPTER=OFF \
            -DEZO_BUILD_POSIX_UART_ADAPTER=OFF \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/deps-install"
          cmake --build ezo-driver-build --parallel
          cmake --install ezo-driver-build

      - name: Install ezo-driver from release (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/feastorg/ezo-driver/archive/refs/tags/v0.5.1.tar.gz" -OutFile "ezo-driver.tar.gz"
          tar -xzf ezo-driver.tar.gz
          cmake -S ezo-driver-0.5.1 -B ezo-driver-build -A x64 `
            -DEZO_BUILD_TESTS=OFF `
            -DEZO_BUILD_EXAMPLES=OFF `
            -DEZO_BUILD_ARDUINO_ADAPTER=OFF `
            -DEZO_BUILD_LINUX_ADAPTER=OFF `
            -DEZO_BUILD_POSIX_UART_ADAPTER=OFF `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}\deps-install"
          cmake --build ezo-driver-build --config Release --parallel
          cmake --install ezo-driver-build --config Release

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}
          doNotCache: false

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        working-directory: anolis-provider-ezo
        run: cmake --preset ${{ matrix.configure_preset }} "-DCMAKE_PREFIX_PATH=${{ github.workspace }}/deps-install"

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        working-directory: anolis-provider-ezo
        shell: pwsh
        run: cmake --preset ${{ matrix.configure_preset }} "-DCMAKE_PREFIX_PATH=${{ github.workspace }}\deps-install"

      - name: Build
        working-directory: anolis-provider-ezo
        run: cmake --build --preset ${{ matrix.build_preset }} --parallel

      - name: Test
        working-directory: anolis-provider-ezo
        run: ctest --preset ${{ matrix.test_preset }}
